<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simplicity</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #111111;
    --surface: #1c1c1c;
    --surface2: #242424;
    --border: #2a2a2a;
    --text: #ffffff;
    --text2: #999999;
    --text3: #666666;
    --accent: #ffffff;
    --new: #22c55e;
    --watched-bg: #2a2a2a;
    --nav-h: 72px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  header h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
    font-family: 'Cormorant Garamond', serif;
    text-transform: uppercase;
  }
  .header-subtitle {
    font-size: 12px;
    color: var(--text3);
    font-weight: 400;
  }
  .hamburger {
    width: 36px; height: 36px;
    background: var(--surface);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .hamburger img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .hamburger svg { color: var(--text2); }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 0;
  }
  #search {
    background: var(--surface);
    border: none;
    border-radius: 10px;
    padding: 10px 12px 10px 36px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    width: 100%;
    outline: none;
  }
  #search::placeholder { color: var(--text3); }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
  }

  /* CHANNEL PILLS ROW */
  .channel-pills-row {
    display: none;
    gap: 8px;
    padding: 10px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .channel-pills-row.visible { display: flex; }
  .channel-pills-row::-webkit-scrollbar { display: none; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    z-index: 200;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .channel-pills-nav {
    display: none;
    gap: 8px;
    padding: 8px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .channel-pills-nav.visible { display: flex; }
  .channel-pills-nav::-webkit-scrollbar { display: none; }

  .nav-tabs {
    display: flex;
    align-items: stretch;
    height: var(--nav-h);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
    color: var(--text3);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2px;
    transition: color 0.2s;
    border: none;
    background: none;
    padding: 8px 0;
    position: relative;
  }
  .nav-item.active { color: var(--text); }
  .nav-item.active::after {
    content: '';
    position: absolute;
    bottom: 6px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text);
  }

  .ch-pill {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .ch-pill.active {
    background: var(--text);
    color: #000;
    border-color: var(--text);
  }

  /* PTR */
  .ptr-indicator {
    text-align: center;
    padding: 8px;
    color: var(--text3);
    font-size: 11px;
    display: none;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .ptr-indicator.visible { display: block; }

  /* CONTINUE WATCHING */
  .continue-section {
    padding: 16px 16px 0;
    display: none;
  }
  .continue-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .continue-section h2 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .see-all {
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
  }
  .continue-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .continue-scroll::-webkit-scrollbar { display: none; }
  .continue-card { flex-shrink: 0; width: 150px; cursor: pointer; }
  .continue-thumb-wrap {
    position: relative;
    width: 150px;
    height: 85px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
  }
  .continue-thumb { width: 100%; height: 100%; object-fit: cover; }
  .continue-duration {
    position: absolute;
    bottom: 5px;
    right: 5px;
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 5px;
    border-radius: 3px;
  }
  .continue-progress { height: 2px; background: var(--border); border-radius: 1px; margin-top: 5px; }
  .continue-progress-bar { height: 100%; background: #e63939; border-radius: 1px; }
  .continue-ch { font-size: 10px; color: var(--text3); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .continue-title {
    font-size: 12px; color: var(--text); margin-top: 2px; line-height: 1.3; font-weight: 500;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* FEED - horizontal thumbnail layout like the mockup */
  .feed {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .video-card {
    display: flex;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s;
    align-items: flex-start;
    position: relative;
  }
  .video-card:last-child { border-bottom: none; }
  .video-card.watched { opacity: 0.5; }

  .thumb-wrap {
    position: relative;
    flex-shrink: 0;
    width: 160px;
    height: 90px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface);
  }
  .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }

  .duration-badge {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
  }
  .new-badge {
    position: absolute;
    top: 4px;
    left: 4px;
    background: var(--new);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .watched-badge {
    position: absolute;
    top: 4px;
    left: 4px;
    background: rgba(0,0,0,0.75);
    color: var(--text3);
    font-size: 9px;
    font-weight: 600;
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .card-info {
    flex: 1;
    min-width: 0;
    padding-top: 2px;
  }
  .card-channel {
    font-size: 11px;
    color: var(--text3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta { font-size: 12px; color: var(--text3); }

  .card-menu {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* SKELETONS */
  .skeleton-card {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .skeleton-thumb {
    flex-shrink: 0;
    width: 160px; height: 90px;
    border-radius: 8px;
    background: linear-gradient(90deg, #1c1c1c 25%, #242424 50%, #1c1c1c 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .skeleton-info { flex: 1; padding-top: 4px; }
  .skeleton-line {
    height: 11px; border-radius: 5px; margin-bottom: 8px;
    background: linear-gradient(90deg, #1c1c1c 25%, #242424 50%, #1c1c1c 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite;
  }
  .skeleton-line.s { width: 40%; }
  .skeleton-line.m { width: 90%; }
  .skeleton-line.l { width: 70%; }
  .skeleton-line.xs { width: 25%; }
  @keyframes shimmer { to { background-position: -200% 0; } }

  .empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

  /* DRAWER */
  .drawer-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 300;
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: -100%;
    width: 80%; max-width: 300px; height: 100%;
    background: var(--surface); z-index: 400;
    transition: right 0.28s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
  }
  .drawer.open { right: 0; }
  .drawer-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-title { font-size: 18px; font-weight: 600; color: var(--text); font-family: 'Cormorant Garamond', serif; letter-spacing: 2px; text-transform: uppercase; }
  .drawer-close { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; }
  .drawer-body { overflow-y: auto; flex: 1; padding: 8px 0 20px; }
  .drawer-category {
    padding: 12px 16px 4px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); font-weight: 600;
  }
  .drawer-channel {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px; cursor: pointer; transition: background 0.15s;
    border: none; background: none; width: 100%; text-align: left;
  }
  .drawer-channel:active { background: var(--surface2); }
  .drawer-channel.active { background: rgba(255,255,255,0.05); }
  .drawer-ch-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border); flex-shrink: 0; transition: background 0.15s;
  }
  .drawer-channel.active .drawer-ch-dot { background: var(--text); }
  .drawer-ch-name { font-size: 14px; font-weight: 500; color: var(--text2); font-family: 'DM Sans', sans-serif; }
  .drawer-channel.active .drawer-ch-name { color: var(--text); }

  /* PLAYER MODAL */
  .player-modal {
    display: none; position: fixed; inset: 0;
    background: #000; z-index: 1000; flex-direction: column;
  }
  .player-modal.open { display: flex; }
  .player-modal-header { padding: 16px 16px 12px; display: flex; align-items: flex-start; gap: 12px; }
  .player-close { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; flex-shrink: 0; }
  .player-info { flex: 1; }
  .player-title { font-size: 18px; font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 4px; }
  .player-channel { font-size: 13px; color: var(--text3); font-weight: 500; }
  .player-frame-wrap { position: relative; width: 100%; padding-top: 56.25%; }
  .player-frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .player-watch-on {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 16px; color: var(--text3); font-size: 13px; cursor: pointer;
  }
  .player-watch-on svg { opacity: 0.6; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-left">
      <h1>SIMPLICITY</h1>
      <span class="header-subtitle" id="video-count">Loading...</span>
    </div>
    <button class="hamburger" onclick="openDrawer()" aria-label="Channels">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="Search videos..." oninput="renderFeed()">
  </div>
</header>

<!-- Drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">Channels</span>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<div class="ptr-indicator" id="ptr">↓ Refreshing</div>

<div class="continue-section" id="continue-section">
  <div class="continue-header">
    <h2>Continue Watching</h2>
    <button class="see-all">See All</button>
  </div>
  <div class="continue-scroll" id="continue-scroll"></div>
</div>

<div class="feed" id="feed"></div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="channel-pills-nav" id="channel-pills-nav"></div>
  <div class="nav-tabs">
    <button class="nav-item active" onclick="selectCategory('All', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      All
    </button>
    <button class="nav-item" onclick="selectCategory('Golf', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="7" r="3"/><path d="M12 10v11M9 21h6"/><path d="M17 4l2-1"/></svg>
      Golf
    </button>
    <button class="nav-item" onclick="selectCategory('Packers', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><ellipse cx="12" cy="12" rx="9" ry="5.5" transform="rotate(-35 12 12)"/><path d="M7 9l10 6M8.5 7l7 10"/></svg>
      Packers
    </button>
    <button class="nav-item" onclick="selectCategory('Sports Talk', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="2" width="6" height="10" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
      Sports
    </button>
    <button class="nav-item" onclick="selectCategory('Other', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      Other
    </button>
  </div>
</nav>

<!-- Player Modal -->
<div class="player-modal" id="player-modal">
  <div class="player-modal-header">
    <button class="player-close" onclick="closePlayer()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div class="player-info">
      <div class="player-title" id="player-title"></div>
      <div class="player-channel" id="player-channel"></div>
    </div>
  </div>
  <div class="player-frame-wrap">
    <iframe id="player-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
  <div class="player-watch-on" id="player-watch-on">
    <span>Watch on</span>
    <svg width="60" height="14" viewBox="0 0 90 20" fill="white"><text y="16" font-size="18" font-family="Arial" font-weight="bold">YouTube</text></svg>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
  </div>
</div>

<script>
const CHANNELS = [
  { name: 'Bob Does Sports',     id: 'UCqr4sONkmFEOPc3rfoVLEvg', category: 'Golf' },
  { name: 'Bob Does Sports Pod', id: 'UCNgebo9LnovieD353k-YRag',  category: 'Golf' },
  { name: 'Grant Horvat',        id: 'UCgUueMmSpcl-aCTt5CuCKQw', category: 'Golf' },
  { name: 'Grant Horvat 2',      id: 'UCjw5RoGW4zG-zNpc5v8oFxA', category: 'Golf' },
  { name: 'Golf Digest',         id: 'UClBd3yC3TBTICIZqujCk1Hw', category: 'Golf' },
  { name: 'Shane Oh Golf',       id: 'UCXSpdCC9PKlul28Yiq4OdnA', category: 'Golf' },
  { name: 'Locked On Packers',   id: 'UCufUP6i_pdfTjqVEswITOmw', category: 'Packers' },
  { name: 'Pack-A-Day Podcast',  id: 'UCSGx5Pq0zA_7O726M3JEptA', category: 'Packers' },
  { name: 'Cheesehead TV',       id: 'UCMzR22wVc2Ru8Hz0fsVzkIQ', category: 'Packers' },
  { name: 'SidelineScoop',       id: 'UCk42R8SfxN9S0rXCs3M6PJg', category: 'Packers' },
  { name: 'Basaraski',           id: 'UCd9L1l2Odu2cND3ILHiuJQQ', category: 'Packers' },
  { name: 'Go Pack Show',        id: 'UCi7MwcGY2NkYNTDP60nlmTA', category: 'Packers' },
  { name: 'Green Bay Packers',   id: 'UCJtI-l6La0zniodFtSHYrBg', category: 'Packers' },
  { name: 'Le Batard Show',      id: 'UCAIZ314ffmfM4PynCR8vElw', category: 'Sports Talk' },
  { name: 'Locked On White Sox', id: 'UCcvbtp567XlaGyMs8w_DTFA', category: 'Sports Talk' },
  { name: 'Andrew Fenichel',     id: 'UCenGh_r6mAm8uvnso5JWVjA', category: 'Sports Talk' },
  { name: 'History at Night',    id: 'UCKDRru3yD00CpqKZRs69vWg', category: 'Other' },
];

const CATEGORIES = ['Golf', 'Packers', 'Sports Talk', 'Other'];
const PROXIES = [
  'https://api.allorigins.win/get?url=',
  'https://corsproxy.io/?',
  'https://api.codetabs.com/v1/proxy?quest=',
];

async function fetchWithProxy(url) {
  for (const proxy of PROXIES) {
    try {
      const isAllOrigins = proxy.includes('allorigins');
      const res = await fetch(proxy + encodeURIComponent(url));
      if (!res.ok) continue;
      if (isAllOrigins) {
        const json = await res.json();
        return json.contents;
      } else {
        return await res.text();
      }
    } catch { continue; }
  }
  return null;
}
let allVideos = [];
let activeCategory = 'All';
let activeChannel = 'All';
let currentVideoId = null;

function getWatched() { try { return JSON.parse(localStorage.getItem('sw_watched') || '{}'); } catch { return {}; } }
function markWatched(id) { const w = getWatched(); w[id] = Date.now(); try { localStorage.setItem('sw_watched', JSON.stringify(w)); } catch {} }
function getContinue() { try { return JSON.parse(localStorage.getItem('sw_continue') || '[]'); } catch { return []; } }
function addToContinue(video) {
  let list = getContinue().filter(v => v.id !== video.id);
  list.unshift(video);
  try { localStorage.setItem('sw_continue', JSON.stringify(list.slice(0, 8))); } catch {}
}

function openDrawer() {
  buildDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function buildDrawer() {
  const body = document.getElementById('drawer-body');
  let html = '';
  CATEGORIES.forEach(cat => {
    const channels = CHANNELS.filter(c => c.category === cat);
    html += `<div class="drawer-category">${cat}</div>`;
    channels.forEach(ch => {
      html += `<button class="drawer-channel${activeChannel === ch.name ? ' active' : ''}" onclick="jumpToChannel('${ch.name}')">
        <div class="drawer-ch-dot"></div>
        <span class="drawer-ch-name">${ch.name}</span>
      </button>`;
    });
  });
  body.innerHTML = html;
}
function jumpToChannel(channelName) {
  const ch = CHANNELS.find(c => c.name === channelName);
  if (ch) {
    activeCategory = ch.category;
    activeChannel = channelName;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const idx = ['All','Golf','Packers','Sports Talk','Other'].indexOf(ch.category);
    document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
    buildChannelPills(ch.category, channelName);
  }
  closeDrawer();
  renderFeed();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildChannelPills(cat, selected) {
  const row = document.getElementById('channel-pills-nav');
  if (!cat || cat === 'All') { row.classList.remove('visible'); return; }
  const channels = [...new Set(allVideos.filter(v => v.category === cat).map(v => v.channelName))];
  row.innerHTML = `<button class="ch-pill${selected === 'All' ? ' active' : ''}" onclick="selectChannel('All',this)">All</button>` +
    channels.map(ch => `<button class="ch-pill${selected === ch ? ' active' : ''}" onclick="selectChannel('${ch}',this)">${ch}</button>`).join('');
  row.classList.add('visible');
}

async function fetchChannelVideos(channel) {
  try {
    const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channel.id}`;
    const contents = await fetchWithProxy(rssUrl);
    if (!contents) return [];
    const xml = new DOMParser().parseFromString(contents, 'text/xml');
    return Array.from(xml.querySelectorAll('entry')).slice(0, 15).map(entry => {
      const videoId = entry.querySelector('videoId')?.textContent || entry.querySelector('id')?.textContent?.split(':').pop();
      // Duration from media:group > media:content seconds attribute
      const seconds = entry.querySelector('content')?.getAttribute('duration') ||
                      entry.querySelector('duration')?.getAttribute('seconds') || null;
      return {
        id: videoId,
        title: entry.querySelector('title')?.textContent || '',
        thumbnail: `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`,
        channelName: channel.name,
        category: channel.category,
        publishedAt: entry.querySelector('published')?.textContent || '',
        seconds: seconds,
      };
    });
  } catch { return []; }
}

function formatDuration(seconds) {
  if (!seconds) return null;
  const s = parseInt(seconds);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
  return m + ':' + String(sec).padStart(2,'0');
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  return `${Math.floor(days / 30)}mo ago`;
}
function isNew(dateStr) { return Date.now() - new Date(dateStr).getTime() < 24 * 60 * 60 * 1000; }

function renderContinue() {
  const list = getContinue();
  const section = document.getElementById('continue-section');
  if (!list.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  document.getElementById('continue-scroll').innerHTML = list.map(v => `
    <div class="continue-card" data-vid="${v.id}">
      <div class="continue-thumb-wrap">
        <img class="continue-thumb" src="${v.thumbnail}" alt="">
      </div>
      <div class="continue-progress"><div class="continue-progress-bar" style="width:35%"></div></div>
      <div class="continue-ch">${v.channelName}</div>
      <div class="continue-title">${v.title}</div>
    </div>`).join('');
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const query = document.getElementById('search').value.toLowerCase().trim();
  const watched = getWatched();
  let filtered = allVideos;
  if (activeCategory !== 'All') filtered = filtered.filter(v => v.category === activeCategory);
  if (activeChannel !== 'All') filtered = filtered.filter(v => v.channelName === activeChannel);
  if (query) filtered = filtered.filter(v => v.title.toLowerCase().includes(query));
  document.getElementById('video-count').textContent = `${filtered.length} videos`;
  if (!filtered.length) { feed.innerHTML = '<div class="empty">No videos found.</div>'; return; }
  feed.innerHTML = filtered.map(v => {
    const isWatched = !!watched[v.id];
    const newVid = isNew(v.publishedAt);
    const safeId = v.id;
    return `<div class="video-card${isWatched ? ' watched' : ''}" data-vid="${safeId}">
      <div class="thumb-wrap">
        <img src="${v.thumbnail}" alt="" loading="lazy">
        ${newVid && !isWatched ? '<div class="new-badge">NEW</div>' : ''}
        ${isWatched ? '<div class="watched-badge">WATCHED</div>' : ''}
        ${formatDuration(v.seconds) ? `<div class="duration-badge">${formatDuration(v.seconds)}</div>` : ''}
      </div>
      <div class="card-info">
        <div class="card-channel">${v.channelName}</div>
        <div class="card-title">${v.title}</div>
        <div class="card-meta">${timeAgo(v.publishedAt)}</div>
      </div>
      <button class="card-menu" data-menu="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>`;
  }).join('');

  // Attach click handlers after render
  feed.querySelectorAll('.video-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('[data-menu]')) return;
      const vid = allVideos.find(v => v.id === card.dataset.vid);
      if (vid) openPlayer(vid.id, vid.title, vid.channelName);
    });
  });
}

function openPlayer(videoId, title, channelName) {
  currentVideoId = videoId;
  document.getElementById('player-title').textContent = title;
  document.getElementById('player-channel').textContent = channelName;
  document.getElementById('player-iframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById('player-watch-on').onclick = () => window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
  document.getElementById('player-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  markWatched(videoId);
  const video = allVideos.find(v => v.id === videoId);
  if (video) addToContinue(video);
  renderFeed();
  renderContinue();
}
function closePlayer() {
  document.getElementById('player-modal').classList.remove('open');
  document.getElementById('player-iframe').src = '';
  document.body.style.overflow = '';
}

function selectCategory(cat, el) {
  activeCategory = cat;
  activeChannel = 'All';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  buildChannelPills(cat, 'All');
  renderFeed();
}
function selectChannel(ch, el) {
  activeChannel = ch;
  document.querySelectorAll('.ch-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderFeed();
}

function showSkeletons() {
  document.getElementById('feed').innerHTML = Array(8).fill(`
    <div class="skeleton-card">
      <div class="skeleton-thumb"></div>
      <div class="skeleton-info">
        <div class="skeleton-line xs"></div>
        <div class="skeleton-line m"></div>
        <div class="skeleton-line l"></div>
        <div class="skeleton-line s"></div>
      </div>
    </div>`).join('');
}

async function loadVideos() {
  // Load in batches of 4 to avoid overwhelming the proxy
  const batchSize = 4;
  let allResults = [];
  for (let i = 0; i < CHANNELS.length; i += batchSize) {
    const batch = CHANNELS.slice(i, i + batchSize);
    const results = await Promise.allSettled(batch.map(fetchChannelVideos));
    allResults = allResults.concat(results);
    // Small delay between batches
    if (i + batchSize < CHANNELS.length) await new Promise(r => setTimeout(r, 300));
  }
  allVideos = allResults.flatMap(r => r.status === 'fulfilled' ? r.value : [])
    .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  renderFeed();
  renderContinue();
}

let touchStartY = 0, isPulling = false;
document.addEventListener('touchstart', e => { if (window.scrollY === 0) touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchmove', e => {
  if (window.scrollY === 0 && e.touches[0].clientY - touchStartY > 60 && !isPulling) {
    isPulling = true;
    document.getElementById('ptr').classList.add('visible');
  }
}, { passive: true });
document.addEventListener('touchend', async () => {
  if (isPulling) {
    isPulling = false;
    showSkeletons();
    await loadVideos();
    document.getElementById('ptr').classList.remove('visible');
  }
  touchStartY = 0;
});

window.addEventListener('popstate', () => {
  if (document.getElementById('player-modal').classList.contains('open')) closePlayer();
});

showSkeletons();
loadVideos();
</script>
</body>
</html>
