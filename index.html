<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simplicity</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #040406;
    --surface: #1c1c1c;
    --surface2: #242424;
    --border: #2a2a2a;
    --text: #ffffff;
    --text2: #aaaaaa;
    --text3: #666666;
    --new: #22c55e;
    --nav-h: 72px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: calc(var(--nav-h) + 40px + env(safe-area-inset-bottom));
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-left { display: flex; align-items: baseline; gap: 10px; }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 600; letter-spacing: 3px;
    color: var(--text); line-height: 1; text-transform: uppercase;
  }
  .header-subtitle { font-size: 12px; color: var(--text3); font-weight: 400; }
  .hamburger {
    width: 36px; height: 36px; background: var(--surface);
    border: none; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .hamburger svg { color: var(--text2); }
  .search-wrap { position: relative; }
  #search {
    background: var(--surface); border: none; border-radius: 10px;
    padding: 10px 12px 10px 36px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; width: 100%; outline: none;
  }
  #search::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); }

  /* SCROLL FADES — sit above header/nav using pointer-events:none */
  .fade-top {
    position: fixed; top: 0; left: 0; right: 0;
    height: 140px; pointer-events: none; z-index: 99;
    background: linear-gradient(to bottom,
      rgba(4,4,6,1) 0%,
      rgba(4,4,6,0.85) 35%,
      rgba(4,4,6,0.4) 65%,
      transparent 100%
    );
  }
  .fade-bottom {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 180px; pointer-events: none; z-index: 199;
    background: linear-gradient(to top,
      rgba(4,4,6,1) 0%,
      rgba(4,4,6,0.95) 40%,
      rgba(4,4,6,0.58) 65%,
      transparent 100%
    );
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 1px solid var(--border);
    z-index: 200; padding-bottom: env(safe-area-inset-bottom);
  }
  .channel-pills-nav {
    display: none; gap: 8px; padding: 8px 16px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .channel-pills-nav.visible { display: flex; }
  .channel-pills-nav::-webkit-scrollbar { display: none; }
  .nav-tabs { display: flex; align-items: stretch; height: var(--nav-h); }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    cursor: pointer; color: var(--text3); font-size: 10px; font-weight: 500;
    letter-spacing: 0.2px; transition: color 0.2s; border: none; background: none;
    padding: 8px 0; position: relative;
  }
  .nav-item.active { color: var(--text); }
  .nav-item.active::after {
    content: ''; position: absolute; bottom: 8px;
    width: 4px; height: 4px; border-radius: 50%; background: var(--new);
  }
  .ch-pill {
    flex-shrink: 0; padding: 5px 13px; border-radius: 999px;
    border: 1px solid var(--border); font-size: 11px; font-weight: 500;
    color: var(--text3); cursor: pointer; transition: all 0.15s;
    white-space: nowrap; background: transparent; font-family: 'DM Sans', sans-serif;
  }
  .ch-pill.active { background: var(--text); color: #000; border-color: var(--text); }

  /* PTR */
  .ptr-indicator {
    text-align: center; padding: 8px; color: var(--text3);
    font-size: 11px; display: none; letter-spacing: 1px; text-transform: uppercase;
  }
  .ptr-indicator.visible { display: block; }

  /* FEED */
  .feed { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }

  /* CARDS */
  .video-card {
    position: relative; border-radius: 16px; overflow: hidden;
    cursor: pointer; background: var(--surface);
    transition: opacity 0.2s, transform 0.15s;
    border: 1px solid rgba(255,255,255,0.16);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.27),
      inset 1px 0 0 rgba(255,255,255,0.14),
      inset 0 -2px 12px rgba(0,0,0,0.6),
      0 4px 16px rgba(0,0,0,0.65),
      0 14px 48px rgba(0,0,0,0.55);
  }
  .video-card::before {
    content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: linear-gradient(
      140deg,
      rgba(255,255,255,0.20) 0%,
      rgba(255,255,255,0.06) 28%,
      transparent 52%
    );
  }
  .video-card::after {
    content: ''; position: absolute; bottom: -20px; right: -20px;
    width: 70%; height: 70%; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse at bottom right,
      rgba(34,197,94,0.21) 0%,
      rgba(34,197,94,0.075) 45%,
      transparent 70%
    );
    border-radius: 50%; filter: blur(16px);
  }
  .video-card.is-new::after {
    background: radial-gradient(ellipse at bottom right,
      rgba(34,197,94,0.32) 0%,
      rgba(34,197,94,0.135) 45%,
      transparent 70%
    );
  }
  .video-card.watched { opacity: 0.38; }
  .video-card:active { transform: scale(0.985); }

  .card-thumb-wrap { position: relative; width: 100%; padding-top: 56.25%; }
  .card-thumb-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .card-thumb-wrap::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 20%, rgba(0,0,0,0.49) 52%, rgba(0,0,0,1.0) 100%);
    pointer-events: none; z-index: 1;
  }
  .badge-new {
    position: absolute; top: 10px; left: 10px; z-index: 4;
    background: var(--new); color: #fff;
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    border-radius: 5px; letter-spacing: 0.8px; text-transform: uppercase;
  }
  .badge-watched {
    position: absolute; top: 10px; left: 10px; z-index: 4;
    background: rgba(0,0,0,0.75); color: var(--text2);
    font-size: 10px; font-weight: 600; padding: 3px 8px;
    border-radius: 5px; letter-spacing: 0.8px; text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .badge-duration {
    position: absolute; top: 10px; right: 10px; z-index: 4;
    background: rgba(0,0,0,0.82); color: #fff;
    font-size: 11px; font-weight: 600; padding: 3px 7px;
    border-radius: 5px; letter-spacing: 0.3px;
  }
  .card-progress {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 5;
    height: 3px; background: rgba(255,255,255,0.15);
  }
  .card-progress-bar { height: 100%; background: #e63939; border-radius: 1px; }
  .card-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
    padding: 10px 12px 12px; display: flex; align-items: flex-end; gap: 10px;
  }
  .channel-badge {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%;
    background: var(--surface2); border: 1.5px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .card-text { flex: 1; min-width: 0; }
  .card-channel-line {
    font-size: 10px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px;
  }
  .card-title-overlay {
    font-size: 15px; font-weight: 600; color: #fff; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .card-menu-btn {
    position: absolute; bottom: 12px; right: 10px; z-index: 5;
    background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; padding: 4px;
  }

  /* SKELETONS */
  .skeleton-card { border-radius: 14px; overflow: hidden; background: var(--surface); border: 1px solid var(--border); }
  .skeleton-thumb {
    width: 100%; padding-top: 56.25%;
    background: linear-gradient(90deg, #1c1c1c 25%, #242424 50%, #1c1c1c 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

  /* SPLASH SCREEN */
  .splash {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    transition: opacity 0.6s ease;
  }
  .splash.hidden { opacity: 0; pointer-events: none; }
  .splash img {
    width: 100px; height: 100px;
    animation: pulse 2s ease-in-out infinite;
  }
  .splash-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--text3);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* DRAWER */
  .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: -100%; width: 80%; max-width: 300px; height: 100%;
    background: var(--surface); z-index: 400;
    transition: right 0.28s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column;
  }
  .drawer.open { right: 0; }
  .drawer-header {
    padding: 20px 16px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .drawer-title {
    font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600;
    color: var(--text); letter-spacing: 2px; text-transform: uppercase;
  }
  .drawer-close { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; }
  .drawer-body { overflow-y: auto; flex: 1; padding: 8px 0 20px; }
  .drawer-section-btn {
    display: flex; align-items: center; gap: 12px; padding: 13px 16px;
    cursor: pointer; transition: background 0.15s; border: none; background: none;
    width: 100%; text-align: left; border-bottom: 1px solid var(--border);
  }
  .drawer-section-btn:active { background: var(--surface2); }
  .drawer-section-icon { color: var(--text3); }
  .drawer-section-name { font-size: 14px; font-weight: 500; color: var(--text2); font-family: 'DM Sans', sans-serif; }
  .drawer-category { padding: 12px 16px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); font-weight: 600; }
  .drawer-channel {
    display: flex; align-items: center; gap: 10px; padding: 11px 16px;
    cursor: pointer; transition: background 0.15s; border: none; background: none; width: 100%; text-align: left;
  }
  .drawer-channel:active { background: var(--surface2); }
  .drawer-channel.active { background: rgba(255,255,255,0.05); }
  .drawer-ch-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .drawer-channel.active .drawer-ch-dot { background: var(--text); }
  .drawer-ch-name { font-size: 14px; font-weight: 500; color: var(--text2); font-family: 'DM Sans', sans-serif; }
  .drawer-channel.active .drawer-ch-name { color: var(--text); }

  /* HISTORY PANEL */
  .history-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 500; flex-direction: column; }
  .history-panel.open { display: flex; }
  .history-header { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .history-back { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; }
  .history-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: 2px; text-transform: uppercase; }
  .history-body { overflow-y: auto; flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
  .history-empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

  /* PLAYER */
  .player-modal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; justify-content: center; }
  .player-modal.open { display: flex; }
  .player-modal-header { padding: 16px 16px 12px; display: flex; align-items: flex-start; gap: 12px; }
  .player-close { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; flex-shrink: 0; }
  .player-info { flex: 1; }
  .player-title { font-size: 17px; font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 4px; }
  .player-channel { font-size: 13px; color: var(--text3); font-weight: 500; }
  .player-frame-wrap { position: relative; width: 100%; padding-top: 56.25%; }
  .player-frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .player-watch-on {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 16px; color: var(--text3); font-size: 13px; cursor: pointer;
    border: none; background: none; width: 100%; font-family: 'DM Sans', sans-serif;
  }
</style>
</head>

      Packers
    </button>
    <button class="nav-item" onclick="selectCategory('Sports Talk', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="2" width="6" height="10" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg>
      Sports
    </button>
    <button class="nav-item" onclick="selectCategory('Shorts & Other', this)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M10 8l5 4-5 4V8z" fill="currentColor" stroke="none"/></svg>

</nav>

<div class="player-modal" id="player-modal">
  <div class="player-modal-header">
    <button class="player-close" onclick="closePlayer()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div class="player-info">
      <div class="player-title" id="player-title"></div>
      <div class="player-channel" id="player-channel"></div>
    </div>
  </div>
  <div class="player-frame-wrap">
    <iframe id="player-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
  <button class="player-watch-on" id="player-watch-on">
    Watch on YouTube
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
  </button>
</div>

<script>
const CHANNELS = [
  { name: 'Bob Does Sports',     id: 'UCqr4sONkmFEOPc3rfoVLEvg', category: 'Golf' },
  { name: 'Bob Does Sports Pod', id: 'UCNgebo9LnovieD353k-YRag',  category: 'Golf' },
  { name: 'Grant Horvat',        id: 'UCgUueMmSpcl-aCTt5CuCKQw', category: 'Golf' },
  { name: 'Grant Horvat 2',      id: 'UCjw5RoGW4zG-zNpc5v8oFxA', category: 'Golf' },
  { name: 'Golf Digest',         id: 'UClBd3yC3TBTICIZqujCk1Hw', category: 'Golf' },
  { name: 'Shane Oh Golf',       id: 'UCXSpdCC9PKlul28Yiq4OdnA', category: 'Golf' },
  { name: 'Locked On Packers',   id: 'UCufUP6i_pdfTjqVEswITOmw', category: 'Packers' },
  { name: 'Pack-A-Day Podcast',  id: 'UCSGx5Pq0zA_7O726M3JEptA', category: 'Packers' },
  { name: 'Cheesehead TV',       id: 'UCMzR22wVc2Ru8Hz0fsVzkIQ', category: 'Packers' },
  { name: 'SidelineScoop',       id: 'UCk42R8SfxN9S0rXCs3M6PJg', category: 'Packers' },
  { name: 'Basaraski',           id: 'UCd9L1l2Odu2cND3ILHiuJQQ', category: 'Packers' },
  { name: 'Go Pack Show',        id: 'UCi7MwcGY2NkYNTDP60nlmTA', category: 'Packers' },
  { name: 'Green Bay Packers',   id: 'UCJtI-l6La0zniodFtSHYrBg', category: 'Packers' },
  { name: 'Le Batard Show',      id: 'UCAIZ314ffmfM4PynCR8vElw', category: 'Sports Talk' },
  { name: 'Locked On White Sox', id: 'UCcvbtp567XlaGyMs8w_DTFA', category: 'Sports Talk' },
  { name: 'Andrew Fenichel',     id: 'UCenGh_r6mAm8uvnso5JWVjA', category: 'Sports Talk' },
  { name: 'History at Night',    id: 'UCKDRru3yD00CpqKZRs69vWg', category: 'Shorts & Other' },
];

const CATEGORIES = ['Golf', 'Packers', 'Sports Talk', 'Shorts & Other'];
// Uses our own Netlify serverless function — always fresh, no third-party caching

let allVideos = [];
let activeCategory = 'All';
let activeChannel = 'All';

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

// Shorts detection cache
function getShortsCache() {
  try { return JSON.parse(localStorage.getItem('sw_shorts') || '{}'); } catch { return {}; }
}
function setShortsCache(id, isShort) {
  const cache = getShortsCache();
  cache[id] = isShort;
  try { localStorage.setItem('sw_shorts', JSON.stringify(cache)); } catch {}
}

function detectShortByThumbnail(videoId) {
  return new Promise(resolve => {
    const cache = getShortsCache();
    if (videoId in cache) { resolve(cache[videoId]); return; }
    const img = new Image();
    img.onload = () => {
      const ratio = img.naturalHeight / img.naturalWidth;
      const isShort = ratio > 1.2;
      setShortsCache(videoId, isShort);
      resolve(isShort);
    };
    img.onerror = () => { resolve(false); };
    // Use oq90default which is the shorts thumbnail format
    img.src = `https://i.ytimg.com/vi/${videoId}/oq90default.jpg`;
  });
}
function getWatched() { try { return JSON.parse(localStorage.getItem('sw_watched') || '{}'); } catch { return {}; } }
function markWatched(id) { const w = getWatched(); w[id] = Date.now(); try { localStorage.setItem('sw_watched', JSON.stringify(w)); } catch {} }
function getContinue() { try { return JSON.parse(localStorage.getItem('sw_continue') || '[]'); } catch { return []; } }
function addToContinue(video) {
  let list = getContinue().filter(v => v.id !== video.id);
  list.unshift(video);
  try { localStorage.setItem('sw_continue', JSON.stringify(list.slice(0, 20))); } catch {}
}

function openDrawer() {
  buildDrawerChannels();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function buildDrawerChannels() {
  const el = document.getElementById('drawer-channels');
  let html = '';
  CATEGORIES.forEach(cat => {
    const channels = CHANNELS.filter(c => c.category === cat);
    html += `<div class="drawer-category">${cat}</div>`;
    channels.forEach(ch => {
      html += `<button class="drawer-channel${activeChannel === ch.name ? ' active' : ''}" data-ch="${ch.name}">
        <div class="drawer-ch-dot"></div>
        <span class="drawer-ch-name">${ch.name}</span>
      </button>`;
    });
  });
  el.innerHTML = html;
  el.querySelectorAll('.drawer-channel').forEach(btn => {
    btn.addEventListener('click', () => jumpToChannel(btn.dataset.ch));
  });
}
function jumpToChannel(channelName) {
  const ch = CHANNELS.find(c => c.name === channelName);
  if (ch) {
    activeCategory = ch.category;
    activeChannel = channelName;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const cats = ['All','Golf','Packers','Sports Talk','Shorts & Other'];
    document.querySelectorAll('.nav-item')[cats.indexOf(ch.category)]?.classList.add('active');
    buildChannelPills(ch.category, channelName);
  }
  closeDrawer();
  renderFeed();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openHistory() {
  closeDrawer();
  const list = getContinue();
  const body = document.getElementById('history-body');
  if (!list.length) {
    body.innerHTML = '<div class="history-empty">No watch history yet.</div>';
  } else {
    body.innerHTML = '';
    list.forEach(v => body.appendChild(buildCard(v, getWatched())));
  }
  document.getElementById('history-panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeHistory() {
  document.getElementById('history-panel').classList.remove('open');
  document.body.style.overflow = '';
}

function buildChannelPills(cat, selected) {
  const row = document.getElementById('channel-pills-nav');
  if (!cat || cat === 'All') { row.classList.remove('visible'); return; }
  const channels = [...new Set(allVideos.filter(v => v.category === cat).map(v => v.channelName))];
  row.innerHTML = `<button class="ch-pill${selected === 'All' ? ' active' : ''}" data-ch="All">All</button>` +
    channels.map(ch => `<button class="ch-pill${selected === ch ? ' active' : ''}" data-ch="${ch}">${ch}</button>`).join('');
  row.classList.add('visible');
  row.querySelectorAll('.ch-pill').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      activeChannel = btn.dataset.ch;
      row.querySelectorAll('.ch-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderFeed();
    });
  });
}

async function fetchRSS(channelId) {
  const ytUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
  const enc = encodeURIComponent(ytUrl);
  // Use timestamp to create unique cache keys per request
  const ts = Date.now();
  const encTs = encodeURIComponent(`${ytUrl}&_=${ts}`);

  const proxies = [
    // Try with cache-busting timestamp first
    `https://api.allorigins.win/raw?url=${encTs}`,
    `https://corsproxy.io/?url=${encTs}`,
    `https://proxy.corsfix.com/?${ytUrl}&_=${ts}`,
    // Then without
    `https://api.allorigins.win/raw?url=${enc}`,
    `https://corsproxy.io/?url=${enc}`,
    `https://api.codetabs.com/v1/proxy?quest=${enc}`,
  ];

  for (const url of proxies) {
    try {
      const controller = new AbortController();
      const t = setTimeout(() => controller.abort(), 12000);
      const res = await fetch(url, {
        signal: controller.signal,
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache' }
      });
      clearTimeout(t);
      if (!res.ok) continue;
      const text = await res.text();
      if (text && text.length > 200 && text.includes('<entry>')) return text;
    } catch { continue; }
  }
  return null;
}

async function fetchChannelVideos(channel) {
  try {
    const contents = await fetchRSS(channel.id);
    if (!contents) return [];
    const xml = new DOMParser().parseFromString(contents, 'text/xml');
    // No date filter — show everything the RSS returns, sorted by date
    // Support both YouTube RSS format (<entry>) and RSSHub format (<item>)
    const isRSSHub = !xml.querySelector('entry') && xml.querySelector('item');
    const items = isRSSHub
      ? Array.from(xml.querySelectorAll('item'))
      : Array.from(xml.querySelectorAll('entry'));

    return items.map(item => {
      let videoId, title, publishedAt, seconds;
      if (isRSSHub) {
        const link = item.querySelector('link')?.textContent || '';
        videoId = link.match(/v=([^&]+)/)?.[1] || link.split('/').pop();
        title = item.querySelector('title')?.textContent || '';
        publishedAt = item.querySelector('pubDate')?.textContent || '';
      } else {
        videoId = item.querySelector('videoId')?.textContent || item.querySelector('id')?.textContent?.split(':').pop();
        title = item.querySelector('title')?.textContent || '';
        publishedAt = item.querySelector('published')?.textContent || '';
        seconds = item.querySelector('content')?.getAttribute('duration') || item.querySelector('duration')?.getAttribute('seconds') || null;
      }
      const isShort = title.toLowerCase().includes('#short') ||
                      title.toLowerCase().includes('#shorts') ||
                      (seconds && parseInt(seconds) <= 90);
      return {
        id: videoId, title,
        thumbnail: `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`,
        channelName: channel.name,
        category: isShort ? 'Shorts & Other' : channel.category,
        publishedAt, seconds, isShort,
      };
    });
  } catch { return []; }
}

function formatDuration(s) {
  if (!s) return null;
  s = parseInt(s);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function timeAgo(d) {
  const diff = Date.now() - new Date(d).getTime();
  const m = Math.floor(diff/60000);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h}h ago`;
  const days = Math.floor(h/24);
  if (days < 30) return `${days}d ago`;
  return `${Math.floor(days/30)}mo ago`;
}
function isNew(d) { return Date.now() - new Date(d).getTime() < 24*60*60*1000; }

function buildCard(v, watched) {
  const isWatched = !!watched[v.id];
  const newVid = isNew(v.publishedAt);
  const dur = formatDuration(v.seconds);
  const inProgress = getContinue().find(c => c.id === v.id);
  const card = document.createElement('div');
  card.className = `video-card${isWatched ? ' watched' : ''}${newVid && !isWatched ? ' is-new' : ''}`;
  card.dataset.vid = v.id;
  card.innerHTML = `
    <div class="card-thumb-wrap">
      <img src="${v.thumbnail}" alt="" loading="lazy">
      ${newVid && !isWatched ? '<div class="badge-new">New</div>' : ''}
      ${isWatched ? '<div class="badge-watched">Watched</div>' : ''}
      ${dur ? `<div class="badge-duration">${dur}</div>` : ''}
      ${inProgress ? `<div class="card-progress"><div class="card-progress-bar" style="width:35%"></div></div>` : ''}
      <div class="card-overlay">
        <div class="channel-badge">${getInitials(v.channelName)}</div>
        <div class="card-text">
          <div class="card-channel-line">${v.channelName} · ${timeAgo(v.publishedAt)}</div>
          <div class="card-title-overlay">${v.title}</div>
        </div>
      </div>
    </div>
    <button class="card-menu-btn" data-menu="true">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>`;
  card.addEventListener('click', e => {
    if (e.target.closest('[data-menu]')) return;
    openPlayer(v.id, v.title, v.channelName);
  });
  return card;
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const query = document.getElementById('search').value.toLowerCase().trim();
  const watched = getWatched();
  let filtered = allVideos;
  if (activeCategory === 'All') {
    filtered = filtered.filter(v => v.category !== 'Shorts & Other');
  } else {
    filtered = filtered.filter(v => v.category === activeCategory);
  }
  if (activeChannel !== 'All') filtered = filtered.filter(v => v.channelName === activeChannel);
  if (query) filtered = filtered.filter(v => v.title.toLowerCase().includes(query));
  // Always sort newest first
  filtered.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  document.getElementById('video-count').textContent = `${filtered.length} videos`;
  if (!filtered.length) { feed.innerHTML = '<div class="empty">No videos found.</div>'; return; }
  feed.innerHTML = '';
  filtered.forEach(v => feed.appendChild(buildCard(v, watched)));
}

function openPlayer(videoId, title, channelName) {
  document.getElementById('player-title').textContent = title;
  document.getElementById('player-channel').textContent = channelName;
  document.getElementById('player-iframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById('player-watch-on').onclick = () => window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
  document.getElementById('player-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  markWatched(videoId);
  const video = allVideos.find(v => v.id === videoId);
  if (video) addToContinue(video);
  renderFeed();
}
function closePlayer() {
  document.getElementById('player-modal').classList.remove('open');
  document.getElementById('player-iframe').src = '';
  document.body.style.overflow = '';
}

function selectCategory(cat, el) {
  activeCategory = cat;
  activeChannel = 'All';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  buildChannelPills(cat, 'All');
  renderFeed();
}

function goToAll() {
  activeCategory = 'All';
  activeChannel = 'All';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-all').classList.add('active');
  document.getElementById('channel-pills-nav').classList.remove('visible');
  renderFeed();
}

function showSkeletons() {
  document.getElementById('feed').innerHTML = Array(6).fill(`
    <div class="skeleton-card"><div class="skeleton-thumb"></div></div>`).join('');
}

async function detectShortsInBackground() {
  const toCheck = allVideos.filter(v => v.category !== 'Shorts & Other');
  // Run in parallel for speed
  await Promise.all(toCheck.map(async video => {
    const isShort = await detectShortByThumbnail(video.id);
    if (isShort) video.category = 'Shorts & Other';
  }));
  // Re-render with correct categories
  renderFeed();
}

async function loadVideos() {
  allVideos = [];
  document.getElementById('video-count').textContent = 'Loading...';
  const promises = CHANNELS.map(channel =>
    fetchChannelVideos(channel).then(videos => {
      if (videos.length === 0) {
        setTimeout(() => {
          fetchChannelVideos(channel).then(retried => {
            if (retried.length > 0) {
              const seen = new Set(allVideos.map(v => v.id));
              const fresh = retried.filter(v => !seen.has(v.id));
              allVideos = [...allVideos, ...fresh]
                .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
              renderFeed();
            }
          }).catch(() => {});
        }, 3000);
        return;
      }
      const seen = new Set(allVideos.map(v => v.id));
      const fresh = videos.filter(v => !seen.has(v.id));
      allVideos = [...allVideos, ...fresh]
        .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
      renderFeed();
    }).catch(() => {})
  );
  await Promise.allSettled(promises);
  // Run shorts detection — wait for it to finish before hiding splash
  await detectShortsInBackground();
  // Hide splash
  const splash = document.getElementById('splash');
  splash.classList.add('hidden');
  setTimeout(() => splash.style.display = 'none', 600);
}

let touchStartY = 0, isPulling = false;
document.addEventListener('touchstart', e => { if (window.scrollY === 0) touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchmove', e => {
  if (window.scrollY === 0 && e.touches[0].clientY - touchStartY > 60 && !isPulling) {
    isPulling = true; document.getElementById('ptr').classList.add('visible');
  }
}, { passive: true });
document.addEventListener('touchend', async () => {
  if (isPulling) {
    isPulling = false; showSkeletons();
    await loadVideos();
    document.getElementById('ptr').classList.remove('visible');
  }
  touchStartY = 0;
});

let playerTouchStartX = 0;
document.getElementById('player-modal').addEventListener('touchstart', e => {
  playerTouchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('player-modal').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - playerTouchStartX;
  if (dx > 80 && playerTouchStartX < 40) { closePlayer(); goToAll(); }
});
window.addEventListener('popstate', () => {
  if (document.getElementById('player-modal').classList.contains('open')) { closePlayer(); goToAll(); }
});

showSkeletons();
loadVideos();
</script>
