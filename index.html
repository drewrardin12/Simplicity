<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simplicity</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #222;
    --text: #f0f0f0;
    --muted: #555;
    --accent: #e8c840;
    --new: #4caf7d;
    --nav-h: 100px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: var(--nav-h);
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #video-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .hamburger {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    padding: 4px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.3s;
  }
  .search-wrap { position: relative; }
  #search {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  /* DRAWER */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    backdrop-filter: blur(2px);
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed;
    top: 0;
    right: -100%;
    width: 80%;
    max-width: 320px;
    height: 100%;
    background: var(--surface);
    z-index: 400;
    transition: right 0.3s ease;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
  }
  .drawer.open { right: 0; }
  .drawer-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .drawer-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .drawer-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
  }
  .drawer-body { overflow-y: auto; flex: 1; padding: 8px 0; }

  .drawer-category {
    padding: 10px 20px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
  }
  .drawer-channel {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .drawer-channel:hover, .drawer-channel.active {
    background: rgba(232, 200, 64, 0.08);
  }
  .drawer-channel.active .drawer-ch-name { color: var(--accent); }
  .drawer-ch-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .drawer-channel.active .drawer-ch-dot { background: var(--accent); }
  .drawer-ch-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: color 0.15s;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #0f0f0f;
    border-top: 1px solid var(--border);
    z-index: 200;
  }
  .nav-tabs {
    display: flex;
    align-items: stretch;
    height: 58px;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    color: var(--muted);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: color 0.2s;
    border: none;
    background: none;
    padding: 8px 0;
  }
  .nav-item.active { color: var(--accent); }

  .channel-pills-row {
    display: none;
    gap: 8px;
    padding: 6px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    border-top: 1px solid var(--border);
  }
  .channel-pills-row.visible { display: flex; }
  .channel-pills-row::-webkit-scrollbar { display: none; }
  .ch-pill {
    flex-shrink: 0;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    background: transparent;
  }
  .ch-pill.active, .ch-pill:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* PTR */
  .ptr-indicator {
    text-align: center;
    padding: 10px;
    color: var(--muted);
    font-size: 11px;
    display: none;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .ptr-indicator.visible { display: block; }

  /* CONTINUE WATCHING */
  .continue-section {
    padding: 16px 20px 0;
    max-width: 700px;
    margin: 0 auto;
    display: none;
  }
  .continue-section h2 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .continue-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .continue-scroll::-webkit-scrollbar { display: none; }
  .continue-card { flex-shrink: 0; width: 140px; cursor: pointer; }
  .continue-thumb {
    width: 140px; height: 79px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .continue-progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; }
  .continue-progress-bar { height: 100%; background: var(--accent); border-radius: 2px; }
  .continue-title {
    font-size: 11px; color: var(--text); margin-top: 4px; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* FEED */
  .feed {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 700px;
    margin: 0 auto;
  }
  .video-card {
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.2s, opacity 0.2s;
  }
  .video-card.watched { opacity: 0.55; }
  .video-card:hover { transform: translateY(-2px); }
  .thumb-wrap {
    position: relative; width: 100%; padding-top: 56.25%;
    cursor: pointer; background: #111;
  }
  .thumb-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .play-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.2s;
  }
  .thumb-wrap:hover .play-overlay, .thumb-wrap:active .play-overlay { opacity: 1; }
  .play-overlay svg { width: 52px; height: 52px; }
  .new-badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--new); color: #fff;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 4px; letter-spacing: 1px; text-transform: uppercase;
  }
  .watched-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.7); color: var(--muted);
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
  }
  .card-info { padding: 10px 14px 12px; }
  .card-channel {
    font-size: 11px; color: var(--accent); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .card-title { font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--text); margin-bottom: 5px; }
  .card-meta { font-size: 11px; color: var(--muted); }

  /* SKELETONS */
  .skeleton { background: var(--surface); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .skeleton-thumb {
    width: 100%; padding-top: 56.25%;
    background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite;
  }
  .skeleton-info { padding: 10px 14px 12px; }
  .skeleton-line {
    height: 12px; border-radius: 6px;
    background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
    background-size: 200% 100%; animation: shimmer 1.4s infinite; margin-bottom: 8px;
  }
  .skeleton-line.short { width: 35%; }
  .skeleton-line.medium { width: 65%; }
  .skeleton-line.long { width: 88%; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }

  /* PLAYER MODAL */
  .player-modal {
    display: none; position: fixed; inset: 0;
    background: #000; z-index: 1000; flex-direction: column;
  }
  .player-modal.open { display: flex; }
  .player-modal-header {
    padding: 16px 20px;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .player-close { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; flex-shrink: 0; margin-top: 2px; }
  .player-title { font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--text); }
  .player-channel { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .player-frame-wrap { position: relative; width: 100%; padding-top: 56.25%; }
  .player-frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>SIMPLICITY</h1>
    <div class="header-right">
      <span id="video-count"></span>
      <button class="hamburger" onclick="openDrawer()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="Search videos..." oninput="renderFeed()">
  </div>
</header>

<!-- Drawer -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">CHANNELS</span>
    <button class="drawer-close" onclick="closeDrawer()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<div class="ptr-indicator" id="ptr">Refreshing...</div>

<div class="continue-section" id="continue-section">
  <h2>Continue Watching</h2>
  <div class="continue-scroll" id="continue-scroll"></div>
</div>

<div class="feed" id="feed"></div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="channel-pills-row" id="channel-pills-row"></div>
  <div class="nav-tabs">
    <button class="nav-item active" onclick="selectCategory('All', this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      All
    </button>
    <button class="nav-item" onclick="selectCategory('Golf', this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="7" r="3"/><path d="M12 10v11M9 21h6"/><path d="M17 4l2-1"/></svg>
      Golf
    </button>
    <button class="nav-item" onclick="selectCategory('Packers', this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><ellipse cx="12" cy="12" rx="9" ry="6" transform="rotate(-30 12 12)"/><path d="M6.5 8.5l11 7M8 6.5l8 11"/></svg>
      Packers
    </button>
    <button class="nav-item" onclick="selectCategory('Sports Talk', this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Sports
    </button>
    <button class="nav-item" onclick="selectCategory('Other', this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Other
    </button>
  </div>
</nav>

<!-- Player Modal -->
<div class="player-modal" id="player-modal">
  <div class="player-modal-header">
    <button class="player-close" onclick="closePlayer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div>
      <div class="player-title" id="player-title"></div>
      <div class="player-channel" id="player-channel"></div>
    </div>
  </div>
  <div class="player-frame-wrap">
    <iframe id="player-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
</div>

<script>
const CHANNELS = [
  { name: 'Bob Does Sports',     id: 'UCqr4sONkmFEOPc3rfoVLEvg', category: 'Golf' },
  { name: 'Bob Does Sports Pod', id: 'UCNgebo9LnovieD353k-YRag',  category: 'Golf' },
  { name: 'Grant Horvat',        id: 'UCgUueMmSpcl-aCTt5CuCKQw', category: 'Golf' },
  { name: 'Grant Horvat 2',      id: 'UCjw5RoGW4zG-zNpc5v8oFxA', category: 'Golf' },
  { name: 'Golf Digest',         id: 'UClBd3yC3TBTICIZqujCk1Hw', category: 'Golf' },
  { name: 'Shane Oh Golf',       id: 'UCXSpdCC9PKlul28Yiq4OdnA', category: 'Golf' },
  { name: 'Locked On Packers',   id: 'UCufUP6i_pdfTjqVEswITOmw', category: 'Packers' },
  { name: 'Pack-A-Day Podcast',  id: 'UCSGx5Pq0zA_7O726M3JEptA', category: 'Packers' },
  { name: 'Cheesehead TV',       id: 'UCMzR22wVc2Ru8Hz0fsVzkIQ', category: 'Packers' },
  { name: 'SidelineScoop',       id: 'UCk42R8SfxN9S0rXCs3M6PJg', category: 'Packers' },
  { name: 'Basaraski',           id: 'UCd9L1l2Odu2cND3ILHiuJQQ', category: 'Packers' },
  { name: 'Go Pack Show',        id: 'UCi7MwcGY2NkYNTDP60nlmTA', category: 'Packers' },
  { name: 'Green Bay Packers',   id: 'UCJtI-l6La0zniodFtSHYrBg', category: 'Packers' },
  { name: 'Le Batard Show',      id: 'UCAIZ314ffmfM4PynCR8vElw', category: 'Sports Talk' },
  { name: 'Locked On White Sox', id: 'UCcvbtp567XlaGyMs8w_DTFA', category: 'Sports Talk' },
  { name: 'Andrew Fenichel',     id: 'UCenGh_r6mAm8uvnso5JWVjA', category: 'Sports Talk' },
  { name: 'History at Night',    id: 'UCKDRru3yD00CpqKZRs69vWg', category: 'Other' },
];

const CATEGORIES = ['Golf', 'Packers', 'Sports Talk', 'Other'];
const PROXY = 'https://api.allorigins.win/get?url=';
let allVideos = [];
let activeCategory = 'All';
let activeChannel = 'All';

function getWatched() { try { return JSON.parse(localStorage.getItem('sw_watched') || '{}'); } catch { return {}; } }
function markWatched(id) { const w = getWatched(); w[id] = Date.now(); try { localStorage.setItem('sw_watched', JSON.stringify(w)); } catch {} }
function getContinue() { try { return JSON.parse(localStorage.getItem('sw_continue') || '[]'); } catch { return []; } }
function addToContinue(video) {
  let list = getContinue().filter(v => v.id !== video.id);
  list.unshift(video);
  try { localStorage.setItem('sw_continue', JSON.stringify(list.slice(0, 15))); } catch {}
}

function openDrawer() {
  buildDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function buildDrawer() {
  const body = document.getElementById('drawer-body');
  let html = '';
  CATEGORIES.forEach(cat => {
    const channels = CHANNELS.filter(c => c.category === cat);
    html += `<div class="drawer-category">${cat}</div>`;
    channels.forEach(ch => {
      const isActive = activeChannel === ch.name;
      html += `<button class="drawer-channel${isActive ? ' active' : ''}" onclick="jumpToChannel('${ch.name}')">
        <div class="drawer-ch-dot"></div>
        <span class="drawer-ch-name">${ch.name}</span>
      </button>`;
    });
  });
  body.innerHTML = html;
}

function jumpToChannel(channelName) {
  // Set category to match the channel
  const ch = CHANNELS.find(c => c.name === channelName);
  if (ch) {
    activeCategory = ch.category;
    activeChannel = channelName;
    // Update nav tabs
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const catIndex = ['All', 'Golf', 'Packers', 'Sports Talk', 'Other'].indexOf(ch.category);
    document.querySelectorAll('.nav-item')[catIndex]?.classList.add('active');
    // Update channel pills
    buildChannelPills(ch.category, channelName);
  }
  closeDrawer();
  renderFeed();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildChannelPills(cat, selectedChannel) {
  const row = document.getElementById('channel-pills-row');
  if (!cat || cat === 'All') { row.classList.remove('visible'); return; }
  const channels = [...new Set(allVideos.filter(v => v.category === cat).map(v => v.channelName))];
  row.innerHTML = `<button class="ch-pill${selectedChannel === 'All' ? ' active' : ''}" onclick="selectChannel('All', this)">All</button>` +
    channels.map(ch => `<button class="ch-pill${selectedChannel === ch ? ' active' : ''}" onclick="selectChannel('${ch}', this)">${ch}</button>`).join('');
  row.classList.add('visible');
}

async function fetchChannelVideos(channel) {
  try {
    const rssUrl = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${channel.id}`);
    const res = await fetch(`${PROXY}${rssUrl}`);
    const json = await res.json();
    const xml = new DOMParser().parseFromString(json.contents, 'text/xml');
    return Array.from(xml.querySelectorAll('entry')).slice(0, 15).map(entry => {
      const videoId = entry.querySelector('videoId')?.textContent || entry.querySelector('id')?.textContent?.split(':').pop();
      return {
        id: videoId,
        title: entry.querySelector('title')?.textContent || '',
        thumbnail: `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`,
        channelName: channel.name,
        category: channel.category,
        publishedAt: entry.querySelector('published')?.textContent || '',
      };
    });
  } catch { return []; }
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d ago`;
  return `${Math.floor(days / 30)}mo ago`;
}

function isNew(dateStr) {
  return Date.now() - new Date(dateStr).getTime() < 24 * 60 * 60 * 1000;
}

function renderContinue() {
  const list = getContinue();
  const section = document.getElementById('continue-section');
  const scroll = document.getElementById('continue-scroll');
  if (!list.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  scroll.innerHTML = list.map(v => `
    <div class="continue-card" onclick="openPlayer('${v.id}', ${JSON.stringify(v.title)}, '${v.channelName}')">
      <img class="continue-thumb" src="${v.thumbnail}" alt="">
      <div class="continue-progress"><div class="continue-progress-bar" style="width:40%"></div></div>
      <div class="continue-title">${v.title}</div>
    </div>`).join('');
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const query = document.getElementById('search').value.toLowerCase().trim();
  const watched = getWatched();
  let filtered = allVideos;
  if (activeCategory !== 'All') filtered = filtered.filter(v => v.category === activeCategory);
  if (activeChannel !== 'All') filtered = filtered.filter(v => v.channelName === activeChannel);
  if (query) filtered = filtered.filter(v => v.title.toLowerCase().includes(query));
  document.getElementById('video-count').textContent = `${filtered.length} videos`;
  if (!filtered.length) { feed.innerHTML = '<div class="empty">No videos found.</div>'; return; }
  feed.innerHTML = filtered.map(v => {
    const isWatched = !!watched[v.id];
    return `<div class="video-card${isWatched ? ' watched' : ''}">
      <div class="thumb-wrap" onclick="openPlayer('${v.id}', ${JSON.stringify(v.title)}, '${v.channelName}')">
        <img src="${v.thumbnail}" alt="" loading="lazy">
        <div class="play-overlay">
          <svg viewBox="0 0 80 80" fill="none">
            <circle cx="40" cy="40" r="38" fill="rgba(0,0,0,0.6)" stroke="white" stroke-width="2"/>
            <polygon points="32,24 60,40 32,56" fill="white"/>
          </svg>
        </div>
        ${isNew(v.publishedAt) ? '<div class="new-badge">New</div>' : ''}
        ${isWatched ? '<div class="watched-badge">Watched</div>' : ''}
      </div>
      <div class="card-info">
        <div class="card-channel">${v.channelName}</div>
        <div class="card-title">${v.title}</div>
        <div class="card-meta">${timeAgo(v.publishedAt)}</div>
      </div>
    </div>`;
  }).join('');
}

function openPlayer(videoId, title, channelName) {
  const video = allVideos.find(v => v.id === videoId);
  document.getElementById('player-title').textContent = title;
  document.getElementById('player-channel').textContent = channelName;
  document.getElementById('player-iframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  document.getElementById('player-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  markWatched(videoId);
  if (video) addToContinue(video);
  renderFeed();
  renderContinue();
}

function closePlayer() {
  document.getElementById('player-modal').classList.remove('open');
  document.getElementById('player-iframe').src = '';
  document.body.style.overflow = '';
}

function selectCategory(cat, el) {
  activeCategory = cat;
  activeChannel = 'All';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  buildChannelPills(cat, 'All');
  renderFeed();
}

function selectChannel(ch, el) {
  activeChannel = ch;
  document.querySelectorAll('.ch-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderFeed();
}

function showSkeletons() {
  document.getElementById('feed').innerHTML = Array(6).fill(`
    <div class="skeleton">
      <div class="skeleton-thumb"></div>
      <div class="skeleton-info">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line medium"></div>
        <div class="skeleton-line long"></div>
      </div>
    </div>`).join('');
}

async function loadVideos() {
  const results = await Promise.allSettled(CHANNELS.map(fetchChannelVideos));
  allVideos = results.flatMap(r => r.status === 'fulfilled' ? r.value : [])
    .sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  renderFeed();
  renderContinue();
}

let touchStartY = 0, isPulling = false;
document.addEventListener('touchstart', e => { if (window.scrollY === 0) touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchmove', e => {
  if (window.scrollY === 0 && e.touches[0].clientY - touchStartY > 60 && !isPulling) {
    isPulling = true;
    document.getElementById('ptr').classList.add('visible');
  }
}, { passive: true });
document.addEventListener('touchend', async () => {
  if (isPulling) {
    isPulling = false;
    showSkeletons();
    await loadVideos();
    document.getElementById('ptr').classList.remove('visible');
  }
  touchStartY = 0;
});

window.addEventListener('popstate', () => {
  if (document.getElementById('player-modal').classList.contains('open')) closePlayer();
});

showSkeletons();
loadVideos();
</script>
</body>
</html>
